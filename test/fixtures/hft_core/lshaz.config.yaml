cache_line_bytes: 64
cache_line_span_warn: 64
cache_line_span_crit: 128
stack_frame_warn_bytes: 2048
alloc_size_escalation: 256
branch_depth_warn: 4
page_size: 4096
json_output: false
output_file: ""

hot_function_patterns:
  - "*::onMessage*"
  - "*::processOrder*"
  - "*::match*"
  - "*::updateLevel*"
  - "*::allocateReport*"
  - "*::validateOrder*"
  - "*decodeBatch*"
  - "*::lastSequence*"

hot_file_patterns:
  - "*/src/feed_handler*"
  - "*/src/matching_engine*"
  - "*/src/order_book*"

disabled_rules: []
